<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>🤖 AI Chatbot</h2>
<a href="/logout" class="btn btn-danger">Logout</a>

<div id="chatbox" class="border p-3 mt-3" style="height:300px; overflow:auto;"></div>

<div class="input-group mt-3">
    <input type="text" id="msg" class="form-control">
    <button class="btn btn-primary" onclick="send()">Send</button>
</div>

<script>
function loadHistory() {
    fetch("/history")
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("chatbox");
        data.forEach(chat => {
            box.innerHTML += `<p><b>You:</b> ${chat[0]}</p>`;
            box.innerHTML += `<p><b>Bot:</b> ${chat[1]}</p>`;
        });
    });
}

function send() {
    let msg = document.getElementById("msg").value;

    fetch("/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("chatbox");
        box.innerHTML += `<p><b>You:</b> ${msg}</p>`;
        box.innerHTML += `<p><b>Bot:</b> ${data.response}</p>`;
    });

    document.getElementById("msg").value = "";
}

loadHistory();
</script>

</body>
</html>
